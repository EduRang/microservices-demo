name: CI-CD Pipeline

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- INICIO DE INTEGRACION VAULT ---
      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          tlsSkipVerify: true
          secrets: |
            secret/data/online-boutique/github-actions db_user | DB_USER ;
            secret/data/online-boutique/github-actions db_password | DB_PASSWORD

      - name: Verificar secretos inyectados (Evidencia Fase 3)
        run: |
          echo "Conexión a Vault exitosa."
          echo "El usuario de base de datos recuperado de Vault es: $DB_USER"
          # Nota: No imprimimos DB_PASSWORD por seguridad.
      # --- FIN DE INTEGRACION VAULT ---
      - name: Authenticate to Google Cloud
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: "projects/791570281451/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-deployer@project-508b67ba-bc4a-4c1c-9dc.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: "google-github-actions/setup-gcloud@v2"
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: "Get GKE Credentials"
        run: |
          gcloud container clusters get-credentials online-boutique-tf --region us-central1
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # CI: Build and Push only the frontend for this demo
      - name: Build and Push Frontend
        run: |
          docker build -t us-central1-docker.pkg.dev/project-508b67ba-bc4a-4c1c-9dc/boutique-repo/frontend:${{ github.sha }} ./src/frontend
          docker push us-central1-docker.pkg.dev/project-508b67ba-bc4a-4c1c-9dc/boutique-repo/frontend:${{ github.sha }}

      # CD: Deploy using your Helm Chart
      - name: Deploy to GKE
        run: |
          gcloud container clusters get-credentials online-boutique-tf --region us-central1
          helm upgrade --install online-boutique ./helm-chart \
            --set frontend.image.repository=us-central1-docker.pkg.dev/project-508b67ba-bc4a-4c1c-9dc/boutique-repo/frontend \
            --set frontend.image.tag=${{ github.sha }}
            --set database.user=$DB_USER \
            --set database.password=$DB_PASSWORD
